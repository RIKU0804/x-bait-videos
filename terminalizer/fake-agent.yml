# Terminalizer recording config - 自動エージェント実行風の偽ターミナル動画
# 使い方:
#   npx terminalizer render fake-agent.yml -o fake-agent.gif
#
# YAMLの "records" 配列を編集すれば内容を変えられる。
# delay は前の行からの経過時間(ms)。content は表示する文字列。

config:
  command: null
  cwd: null
  env:
    recording: 'true'
  cols: 100
  rows: 32
  repeat: 0
  quality: 100
  frameDelay: auto
  maxIdleTime: 2000
  frameBox:
    type: floating
    title: 'threads-auto-post — claude-code'
    style:
      border: '0px black solid'
      backgroundColor: '#0a0a0a'
      margin: '0px'
  watermark:
    imagePath: null
    style:
      position: absolute
      right: 15px
      bottom: 15px
      width: 100px
      opacity: 0.9
  cursorStyle: block
  fontFamily: 'Cascadia Mono, Consolas, Menlo, Monaco, monospace'
  fontSize: 14
  lineHeight: 1.4
  letterSpacing: 0
  theme:
    background: '#0a0a0a'
    foreground: '#e0e0e0'
    cursor: '#4ade80'
    black: '#1a1a1a'
    red: '#ff6b6b'
    green: '#4ade80'
    yellow: '#fbbf24'
    blue: '#60a5fa'
    magenta: '#f472b6'
    cyan: '#22d3ee'
    white: '#fafafa'
    brightBlack: '#666'
    brightRed: '#ff8787'
    brightGreen: '#86efac'
    brightYellow: '#fde047'
    brightBlue: '#93c5fd'
    brightMagenta: '#f9a8d4'
    brightCyan: '#67e8f9'
    brightWhite: '#fff'

records:
  - delay: 0
    content: "\e[1;32m➜\e[0m \e[1;36mthreads-auto-post\e[0m \e[1;33m(main)\e[0m $ "
  - delay: 500
    content: "claude-code --agent x-poster"
  - delay: 800
    content: "\r\n"
  - delay: 200
    content: "\e[90m→ Loading config from .env.production\e[0m\r\n"
  - delay: 350
    content: "\e[32m✓\e[0m Supabase connected\r\n"
  - delay: 200
