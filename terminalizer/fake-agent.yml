# Terminalizer recording config - 自動エージェント実行風の偽ターミナル動画
# 使い方:
#   npx terminalizer render fake-agent.yml -o fake-agent.gif

config:
  command: null
  cwd: null
  env:
    recording: 'true'
  cols: 100
  rows: 30
  repeat: 0
  quality: 100
  frameDelay: auto
  maxIdleTime: 2000
  frameBox:
    type: floating
    title: 'threads-auto-post — claude-code'
    style:
      border: '0px black solid'
      backgroundColor: '#0d1117'
      margin: '0px'
  watermark:
    imagePath: null
    style:
      position: absolute
      right: 15px
      bottom: 15px
      width: 100px
      opacity: 0.9
  cursorStyle: block
  fontFamily: 'Cascadia Mono, JetBrains Mono, Consolas, Menlo, monospace'
  fontSize: 14
  lineHeight: 1.4
  letterSpacing: 0
  theme:
    background: '#0d1117'
    foreground: '#c9d1d9'
    cursor: '#c9d1d9'
    black: '#484f58'
    red: '#ff7b72'
    green: '#56d364'
    yellow: '#e3b341'
    blue: '#58a6ff'
    magenta: '#bc8cff'
    cyan: '#39c5cf'
    white: '#b1bac4'
    brightBlack: '#6e7681'
    brightRed: '#ffa198'
    brightGreen: '#7ee787'
    brightYellow: '#f2cc60'
    brightBlue: '#79c0ff'
    brightMagenta: '#d2a8ff'
    brightCyan: '#56d4dd'
    brightWhite: '#f0f6fc'

