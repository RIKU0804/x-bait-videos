# 並列エージェントが同時に動いてる感を出すターミナル動画
# 複数のログ行が高速で流れるパターン (バズ狙い)

config:
  command: null
  cwd: null
  env:
    recording: 'true'
  cols: 110
  rows: 36
  repeat: 0
  quality: 100
  frameDelay: auto
  maxIdleTime: 2000
  frameBox:
    type: floating
    title: 'Claude Code — 8 agents running in parallel'
    style:
      border: '0px black solid'
      backgroundColor: '#0a0a0a'
      margin: '0px'
  cursorStyle: block
  fontFamily: 'Cascadia Mono, Consolas, monospace'
  fontSize: 13
  lineHeight: 1.35
  theme:
    background: '#0a0a0a'
    foreground: '#e0e0e0'
    cursor: '#a78bfa'
    green: '#4ade80'
    yellow: '#fbbf24'
    blue: '#60a5fa'
    magenta: '#f472b6'
    cyan: '#22d3ee'

records:
  - delay: 0
    content: "$ npx claude-code orchestrate --parallel 8\r\n"
  - delay: 400
    content: "\e[90m[orchestrator]\e[0m spawning 8 agents...\r\n"
  - delay: 200
    content: "\e[32m[agent-1:x-poster]\e[0m      ● starting\r\n"
